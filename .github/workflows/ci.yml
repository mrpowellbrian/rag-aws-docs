name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  lint-and-test:
    name: lint / typecheck / test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Ruff lint
        run: uv run ruff check src/ tests/

      - name: Ruff format check
        run: uv run ruff format --check src/ tests/

      - name: Typecheck
        run: uv run mypy src/

      - name: Test
        # ANTHROPIC_API_KEY is intentionally absent — tests must not call
        # the API. Any test that requires it should be marked with
        # @pytest.mark.integration and skipped in CI.
        run: uv run pytest --tb=short
